<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <title>{% block title %}In phiếu{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f5f5;
      }
      .page {
        width: 800px;
        margin: 16px auto;
        background: #ffffff;
        padding: 24px 32px;
        border: 1px solid #e5e7eb;
      }
      .heading {
        text-align: center;
        margin-bottom: 16px;
      }
      .heading h1 {
        font-size: 20px;
        margin: 0;
      }
      .heading p {
        margin: 4px 0;
        font-size: 12px;
        color: #4b5563;
      }
      .row {
        display: flex;
        justify-content: space-between;
        font-size: 14px;
        margin-bottom: 4px;
      }
      .section-title {
        margin-top: 16px;
        margin-bottom: 4px;
        font-weight: 600;
        font-size: 14px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
        margin-top: 8px;
      }
      th, td {
        border: 1px solid #e5e7eb;
        padding: 6px 8px;
      }
      th {
        background: #f9fafb;
        text-align: left;
      }
      .sign-row {
        display: flex;
        justify-content: space-between;
        margin-top: 32px;
        font-size: 13px;
      }
      .sign-box {
        width: 45%;
        text-align: center;
      }
      .actions {
        text-align: right;
        margin: 12px auto 0;
        width: 800px;
      }
      .btn {
        display: inline-block;
        padding: 6px 12px;
        font-size: 13px;
        border-radius: 6px;
        border: 1px solid #e5e7eb;
        background: #111827;
        color: white;
        text-decoration: none;
      }
      .btn-secondary {
        background: white;
        color: #111827;
      }
      @media print {
        .actions {
          display: none;
        }
        body {
          background: white;
        }
        .page {
          border: none;
          margin: 0;
          width: auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="actions">
      <a href="#" onclick="window.history.back(); return false;" class="btn btn-secondary">Quay lại</a>
      <a href="#" onclick="window.print(); return false;" class="btn">In phiếu</a>
    </div>
    <div class="page">
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
