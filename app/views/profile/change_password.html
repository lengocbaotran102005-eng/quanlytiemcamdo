{% extends "layouts/base.html" %}

{% block title %}Đổi mật khẩu | Pawnshop{% endblock %}

{% block content %}
  <div class="max-w-md mx-auto">
    <h1 class="text-2xl font-semibold text-slate-900 mb-4">Đổi mật khẩu</h1>
    <form method="post" class="bg-white border border-slate-200 rounded-xl shadow-sm p-6 space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700">Mật khẩu hiện tại</label>
        <input name="current_password" type="password" class="mt-1 block w-full rounded-lg border-slate-200 text-sm focus:ring-primary focus:border-primary" required>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700">Mật khẩu mới</label>
        <input name="new_password" type="password" class="mt-1 block w-full rounded-lg border-slate-200 text-sm focus:ring-primary focus:border-primary" required>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700">Xác nhận mật khẩu mới</label>
        <input name="confirm_password" type="password" class="mt-1 block w-full rounded-lg border-slate-200 text-sm focus:ring-primary focus:border-primary" required>
      </div>
      <div class="flex justify-end gap-2">
        <a href="{{ url_for('profile.index') }}" class="px-4 py-2 text-sm rounded-lg border border-slate-200 text-slate-700 hover:bg-slate-50">Hủy</a>
        <button type="submit" class="px-4 py-2 text-sm rounded-lg bg-primary text-white hover:bg-primary-dark">Lưu</button>
      </div>
      <p class="mt-3 text-xs text-slate-500">
        Mật khẩu nên có ít nhất 8 ký tự, bao gồm chữ hoa và số.
      </p>
    </form>
  </div>
{% endblock %}
