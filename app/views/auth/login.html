{% extends "layouts/auth.html" %}

{% block title %}Đăng nhập | Pawnshop{% endblock %}

{% block content %}
  <form method="post" class="space-y-4">
    <div>
      <label for="username" class="block text-sm font-medium text-slate-700">Tên đăng nhập</label>
      <input
        id="username"
        name="username"
        type="text"
        autocomplete="username"
        class="mt-1 block w-full rounded-lg border-slate-200 shadow-sm focus:ring-primary focus:border-primary text-sm"
        placeholder="vd: admin"
        required
      >
    </div>
    <div>
      <label for="password" class="block text-sm font-medium text-slate-700">Mật khẩu</label>
      <input
        id="password"
        name="password"
        type="password"
        autocomplete="current-password"
        class="mt-1 block w-full rounded-lg border-slate-200 shadow-sm focus:ring-primary focus:border-primary text-sm"
        required
      >
    </div>
    <button
      type="submit"
      class="w-full inline-flex justify-center items-center px-4 py-2.5 bg-primary text-white text-sm font-medium rounded-lg shadow-sm hover:bg-primary-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary"
    >
      Đăng nhập
    </button>
  </form>
{% endblock %}
