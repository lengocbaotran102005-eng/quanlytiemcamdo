{% extends "layouts/base.html" %}

{% block title %}Thêm nhân viên | Pawnshop{% endblock %}

{% block content %}
  <div class="max-w-xl">
    <h1 class="text-2xl font-semibold text-slate-900 mb-4">Thêm nhân viên</h1>
    <form method="post" class="bg-white border border-slate-200 rounded-xl shadow-sm p-6 space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700">Tên đăng nhập</label>
        <input name="username" class="mt-1 block w-full rounded-lg border-slate-200 text-sm focus:ring-primary focus:border-primary" required>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700">Họ tên</label>
        <input name="full_name" class="mt-1 block w-full rounded-lg border-slate-200 text-sm focus:ring-primary focus:border-primary" required>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-slate-700">Số điện thoại</label>
          <input name="phone" class="mt-1 block w-full rounded-lg border-slate-200 text-sm focus:ring-primary focus:border-primary">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700">Vai trò</label>
          <select name="role" class="mt-1 block w-full rounded-lg border-slate-200 text-sm focus:ring-primary focus:border-primary">
            <option value="staff">Nhân viên</option>
            <option value="admin">Quản lý</option>
          </select>
        </div>
      </div>
      <p class="text-xs text-slate-500">
        Mật khẩu tạm sẽ có dạng <code>username@123</code> và hệ thống sẽ yêu cầu đổi mật khẩu ở lần đăng nhập đầu tiên.
      </p>
      <div class="flex justify-end gap-2">
        <a href="{{ url_for('users.index') }}" class="px-4 py-2 text-sm rounded-lg border border-slate-200 text-slate-700 hover:bg-slate-50">Hủy</a>
        <button type="submit" class="px-4 py-2 text-sm rounded-lg bg-primary text-white hover:bg-primary-dark">Lưu</button>
      </div>
    </form>
  </div>
{% endblock %}
