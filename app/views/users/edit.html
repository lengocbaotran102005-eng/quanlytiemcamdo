{% extends "layouts/base.html" %}

{% block title %}Sửa nhân viên | Pawnshop{% endblock %}

{% block content %}
  <div class="max-w-xl">
    <h1 class="text-2xl font-semibold text-slate-900 mb-4">Sửa nhân viên</h1>
    <form method="post" class="bg-white border border-slate-200 rounded-xl shadow-sm p-6 space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700">Tên đăng nhập</label>
        <input value="{{ user.username }}" class="mt-1 block w-full rounded-lg border-slate-200 text-sm bg-slate-50 text-slate-500 cursor-not-allowed" disabled>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700">Họ tên</label>
        <input name="full_name" value="{{ user.full_name }}" class="mt-1 block w-full rounded-lg border-slate-200 text-sm focus:ring-primary focus:border-primary" required>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700">Số điện thoại</label>
        <input name="phone" value="{{ user.phone }}" class="mt-1 block w-full rounded-lg border-slate-200 text-sm focus:ring-primary focus:border-primary">
      </div>
      <div class="flex justify-end gap-2">
        <a href="{{ url_for('users.index') }}" class="px-4 py-2 text-sm rounded-lg border border-slate-200 text-slate-700 hover:bg-slate-50">Hủy</a>
        <button type="submit" class="px-4 py-2 text-sm rounded-lg bg-primary text-white hover:bg-primary-dark">Lưu</button>
      </div>
    </form>
  </div>
{% endblock %}
